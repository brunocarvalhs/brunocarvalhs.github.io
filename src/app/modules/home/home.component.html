<div class="container mx-auto w-full">
  <div class="-mx-4 flex flex-wrap items-center">
    <div class="w-full px-4 lg:w-1/2">
      <div class="mb-12 lg:mb-0">
        <h2 class="mb-5 text-3xl font-bold leading-tight text-white sm:text-[40px] sm:leading-tight md:text-[45px] md:leading-tight lg:text-[38px] lg:leading-tight xl:text-[45px] xl:leading-tight">
          Hello, i am
        </h2>
        <h1 class="mb-10 text-3xl font-bold leading-tight text-white sm:text-[40px] sm:leading-tight md:text-[45px] md:leading-tight lg:text-[38px] lg:leading-tight xl:text-[45px] xl:leading-tight">
          < {{ user.lastname }} />
        </h1>

        <p class="mb-5 text-lg font-semibold text-white">
          Subscribe to get notified when we launch 🎉
        </p>

        <form class="mb-7 flex max-w-[445px] flex-wrap">
          <input type="email" class="mr-3 mb-3 h-[50px] w-full rounded border border-form-stroke bg-white px-5 text-sm text-white outline-none focus:border-primary focus-visible:shadow-none sm:max-w-[220px] md:max-w-[315px] lg:max-w-[250px] xl:max-w-[315px]" placeholder="Your work mail">
          <button class="mb-3 h-[50px] rounded bg-primary px-6 text-sm text-white transition hover:bg-opacity-90">
            Notify Me!
          </button>
        </form>
      </div>
    </div>

    <div class="w-full px-4 lg:w-1/2">
      <div class="-mx-2 flex flex-wrap sm:-mx-4">
        <div class="w-full h-auto px-2 sm:px-4">
          <div class="mb-4 h-auto sm:mb-8 sm:h-auto lg:h-auto xl:h-auto">
            <img src="../../../assets/bruno-carvalho.png" alt="hero image" class="h-full w-full object-cover object-center">
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
